<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ENS - Indaiatuba - Sul I</title>

<meta name="theme-color" content="#275898">

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg,#275898,#1f4775);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    width:100%;
    max-width:400px;
    border-radius:24px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    width:180px;
    margin:auto;
    margin-bottom:20px;
}

.logo img{
    width:100%;
}

h1{
    color:#275898;
    margin-bottom:10px;
    font-size:28px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.install-btn{
    width:100%;
    border:none;
    border-radius:12px;
    background:#275898;
    color:white;
    padding:15px;
    font-size:16px;
    cursor:pointer;
    display:none;
    transition:.2s;
}

.install-btn:hover{
    transform:translateY(-2px);
}

.info{
    color:#888;
    font-size:13px;
    margin-top:20px;
}

.loading{
    display:none;
    color:#275898;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="ENS">
    </div>

    <h1>Setor Indaiatuba</h1>

    <div class="subtitle">
        PROVÍNCIA SUL I
    </div>

    <button id="installBtn" class="install-btn">
        Instalar Aplicativo
    </button>

    <div id="loading" class="loading">
        Preparando instalação...
    </div>

    <div class="info">
        Setor Indaiatuba
    </div>

</div>

<script>

/*
|--------------------------------------------------------------------------
| Se o aplicativo já estiver instalado,
| abre diretamente a tela de carregamento.
|--------------------------------------------------------------------------
*/

if (
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true
){
    window.location.replace('app.html');
}

/*
|--------------------------------------------------------------------------
| Service Worker
|--------------------------------------------------------------------------
*/

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}

/*
|--------------------------------------------------------------------------
| Instalação PWA
|--------------------------------------------------------------------------
*/

let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {

    if (!deferredPrompt) return;

    document.getElementById('loading').style.display = 'block';

    deferredPrompt.prompt();

    const choiceResult = await deferredPrompt.userChoice;

    if (choiceResult.outcome === 'accepted') {

        setTimeout(() => {
            window.location.href = 'instalado.html';
        }, 1000);

    }

    deferredPrompt = null;
});

/*
|--------------------------------------------------------------------------
| Caso o navegador não suporte instalação
|--------------------------------------------------------------------------
*/

window.addEventListener('load', () => {

    setTimeout(() => {

        if (!deferredPrompt && installBtn.style.display === 'none') {

            installBtn.style.display = 'block';
            installBtn.innerText = 'Adicionar à Tela Inicial';

            installBtn.onclick = () => {

                alert(
`No seu navegador:

Android:
⋮ → Adicionar à tela inicial

iPhone:
Compartilhar → Adicionar à Tela de Início`
                );

            };
        }

    }, 2000);

});

</script>

</body>
</html>
