<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENS - Instalação</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#275898">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#275898;
    font-family:Segoe UI,sans-serif;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:320px;
}

img{
    width:120px;
}

button{
    background:#275898;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    width:100%;
    font-size:16px;
    cursor:pointer;
    display:none;
}
</style>
</head>
<body>

<div class="card">
    <img src="logo.png">

    <h2>ENS</h2>

    <p>
        Instale o aplicativo para acesso rápido.
    </p>

    <button id="installBtn">
        Instalar Aplicativo
    </button>
</div>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{
    e.preventDefault();
    deferredPrompt=e;

    document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click',async()=>{

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    await deferredPrompt.userChoice;

    deferredPrompt=null;
});

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
