<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ENS Instalado</title>

<style>

body{
    margin:0;
    background:#275898;
    color:white;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    text-align:center;
    max-width:400px;
    padding:30px;
}

.logo{
    width:140px;
    margin-bottom:25px;
}

h1{
    margin-bottom:15px;
}

p{
    opacity:.95;
    line-height:1.6;
}

.badge{
    margin-top:25px;
    padding:12px;
    border-radius:10px;
    background:rgba(255,255,255,.15);
}

</style>

</head>

<body>

<div class="card">

    <img src="logo.png" class="logo">

    <h1>✅ Aplicativo instalado!</h1>

    <p>
        O aplicativo ENS - Indaiatuba - Sul I foi instalado com sucesso.
    </p>

    <div class="badge">
        Agora utilize o ícone ENS criado na tela inicial do seu dispositivo.
    </div>

</div>

</body>
</html>
